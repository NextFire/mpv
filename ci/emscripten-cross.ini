[built-in options]
buildtype = 'release'
default_library = 'static'
wrap_mode = 'nodownload'
c_args = ['-sWASM_WORKERS=1', '-sAUDIO_WORKLET=1']
cpp_args = ['-sWASM_WORKERS=1', '-sAUDIO_WORKLET=1']

[binaries]
c = 'emcc'
cpp = 'em++'
ar = 'emar'
nm = 'emnm'
ranlib = 'emranlib'
strip = 'llvm-strip'
pkg-config = 'pkg-config'

[host_machine]
system = 'emscripten'
cpu_family = 'wasm32'
cpu = 'wasm32'
endian = 'little'
